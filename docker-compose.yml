name: openclaw

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: openclaw_root_pw
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: openclaw_wp_pw
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:6.7-php8.3-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:80"
    # Resolve subsite hostnames to the container's own loopback so Staatic
    # can crawl `http://<slug>.localhost:8088/` from inside the container.
    # Apache is configured to also listen on 8088 (see apache/openclaw-multisite.conf).
    extra_hosts:
      - "gardening.localhost=127.0.0.1"
      - "dogs.localhost=127.0.0.1"
      - "boardgames.localhost=127.0.0.1"
      - "coffee.localhost=127.0.0.1"
      - "techtools.localhost=127.0.0.1"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: openclaw_wp_pw
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8088');
        define('WP_SITEURL', 'http://localhost:8088');
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
      # Phase 5: per-subsite child themes bind-mounted individually so they
      # survive `docker compose down -v` and are host-editable.
      # openclaw-base + openclaw-techtools are the Step 5.11 shipped themes;
      # the four fandom slug directories (gardening/dogs/boardgames/coffee) are
      # first-round pilot child themes retained until Step 5.9 rebuilds them.
      - ./wp-content/themes/openclaw-base:/var/www/html/wp-content/themes/openclaw-base
      - ./wp-content/themes/openclaw-techtools:/var/www/html/wp-content/themes/openclaw-techtools
      - ./wp-content/themes/openclaw-gardening:/var/www/html/wp-content/themes/openclaw-gardening
      - ./wp-content/themes/openclaw-dogs:/var/www/html/wp-content/themes/openclaw-dogs
      - ./wp-content/themes/openclaw-boardgames:/var/www/html/wp-content/themes/openclaw-boardgames
      - ./wp-content/themes/openclaw-coffee:/var/www/html/wp-content/themes/openclaw-coffee
      # Apache: multisite ServerAlias + second Listen 8088 so Staatic can crawl
      # `<slug>.localhost:8088` from inside the container.
      - ./apache/openclaw-multisite.conf:/etc/apache2/conf-enabled/openclaw-multisite.conf:ro
      # Phase 5 host directory for Staatic exports (per-subsite subfolders).
      - ./staatic-exports:/var/www/html/wp-content/staatic-exports

  wpcli:
    image: wordpress:cli-php8.3
    depends_on:
      - wordpress
    # Share the wordpress container's network namespace so wp-cli inherits its
    # extra_hosts entries (subsite hostnames → 127.0.0.1). Needed for Staatic
    # crawls invoked via `wp staatic publish --url=http://<slug>.localhost:8088/`.
    network_mode: "service:wordpress"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: openclaw_wp_pw
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
      - ./wp-content/themes/openclaw-base:/var/www/html/wp-content/themes/openclaw-base
      - ./wp-content/themes/openclaw-techtools:/var/www/html/wp-content/themes/openclaw-techtools
      - ./wp-content/themes/openclaw-gardening:/var/www/html/wp-content/themes/openclaw-gardening
      - ./wp-content/themes/openclaw-dogs:/var/www/html/wp-content/themes/openclaw-dogs
      - ./wp-content/themes/openclaw-boardgames:/var/www/html/wp-content/themes/openclaw-boardgames
      - ./wp-content/themes/openclaw-coffee:/var/www/html/wp-content/themes/openclaw-coffee
      # Match the wordpress service so `wp staatic publish` writes into the same
      # bind-mounted export tree the host filesystem sees.
      - ./staatic-exports:/var/www/html/wp-content/staatic-exports
    user: "33:33"
    entrypoint: ["wp"]

volumes:
  db_data:
  wp_data:
