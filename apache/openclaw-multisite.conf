# Additional Apache config for the openclaw multisite pilot.
# Bind-mounted into /etc/apache2/conf-enabled/openclaw-multisite.conf.
#
# Purpose: expose the WordPress site on BOTH port 80 (default) and port 8088
# (public URL), and add a *.localhost ServerAlias so subsite hostnames route
# to the same WordPress. Port 80 is what the default VirtualHost uses; port
# 8088 exists so Staatic (running inside the container) can crawl the site
# at the same URL browsers use (http://<slug>.localhost:8088/) via the
# `extra_hosts` entries in docker-compose.yml.

Listen 8088

<VirtualHost *:80>
    ServerName localhost
    ServerAlias *.localhost
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

<VirtualHost *:8088>
    ServerName localhost
    ServerAlias *.localhost
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
